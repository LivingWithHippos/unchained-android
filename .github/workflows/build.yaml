name: Build
on:
  # Trigger on every pull request and on push
  # to the `master` branch.
  # Also allow manual triggering (e.g. for bot-created PRs which don't
  # auto-trigger pull_request events due to GitHub's loop-prevention policy).
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
defaults:
  run:
    # github does not appreciate ~ as home indicator. Prefer the full path.
    working-directory: /home/runner/work/unchained-android/unchained-android/app
jobs:
  lint-release:
    name: Run Release Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run tests
        run: ./gradlew ktfmtCheck
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build the app
        run: ./gradlew clean assembleDebug --stacktrace
      - name: Save apk
        uses: actions/upload-artifact@v6
        with:
          name: apk-debug
          path: /home/runner/work/unchained-android/unchained-android/app/app/build/outputs/apk/debug/*.apk
